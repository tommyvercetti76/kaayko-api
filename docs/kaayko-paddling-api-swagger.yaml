  /paddleScore:
    get:
      tags:
        - paddleScore
      operationId: getCurrentPaddleScore
      summary: Get real-time paddle conditions with ML-powered safety rating
      description: |
        **Real-time paddling condition assessment with machine learning intelligence**
        
        This endpoint analyzes current weather, marine, and environmental conditions to provide an actionable paddle safety rating with detailed condition breakdown.
        
        ### 🧠 Machine Learning Features
        - **Production ML Model**: GradientBoostingRegressor trained on 50,000+ condition combinations
        - **Marine Data Integration**: Real-time wave height and water temperature when available
        - **Smart Penalty System**: Transparent adjustments for extreme conditions
        - **0.5 Precision Ratings**: Only 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0 ratings
        
        ### 📊 Response Content
        - Current weather conditions with marine data
        - ML-generated paddle rating with confidence level  
        - Detailed penalty breakdown and justification
        - Safety warnings and actionable recommendations
        - Beaufort wind scale analysis
        
        ### ⚡ Performance
        **~250ms average response time** - Optimized for real-time mobile applications
        
        ### 🔄 Consistency Guarantee
        Identical conditions will produce identical ratings across `paddleScore` and `fastForecast` endpoints
        
      parameters:
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: -90.0
            maximum: 90.0
            example: 32.881187
          description: |
            **Latitude coordinate in decimal degrees**
            
            Use with `lng` parameter for coordinate-based lookup. Use precise coordinates from the `paddlingOut` endpoint to ensure marine data accuracy.
        - name: lng
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: -180.0
            maximum: 180.0
            example: -96.929937
          description: |
            **Longitude coordinate in decimal degrees**
            
            Use with `lat` parameter for coordinate-based lookup. Use precise coordinates from the `paddlingOut` endpoint to ensure marine data accuracy.
        - name: location
          in: query
          required: false
          schema:
            type: string
            pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?$'
            example: "32.881187,-96.929937"
          description: |
            **GPS coordinates in "latitude,longitude" format**
            
            Alternative to separate lat/lng parameters. Use precise coordinates from the `paddlingOut` endpoint to ensure marine data accuracy.
            
            **Format**: `lat,lng` (comma-separated, no spaces)
            **Example**: `32.881187,-96.929937`
        - name: spotId
          in: query
          required: false
          schema:
            type: string
            enum: ["trinity_river", "cottonwood_lake", "lake_crescent", "jenny_lake", "lake_mcdonald", "white_rock_lake", "lewisville_lake", "merrimack_river", "lake_union", "antero_reservoir", "lake_powell", "jackson_lake", "diablo_lake", "taylor_park", "kens_lake", "colorado_river", "ambazari_lake"]
            example: "trinity_river"
          description: |
            **Pre-configured location identifier for fastest lookup**
            
            Using `spotId` provides fastest response times (~150ms) as location data is pre-cached. Get valid `spotId` values from the `paddlingOut` endpoint.
            
            **Note**: Provide either coordinates (lat+lng OR location) OR spotId, but not both.

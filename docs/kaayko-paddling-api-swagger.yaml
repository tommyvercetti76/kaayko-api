openapi: 3.0.3
info:
  title: Kaayko Paddling Intelligence APIs
  version: "2.1.0"
  description: |
    # Kaayko Paddling Intelligence APIs v2.1.0
    
    **Enterprise-grade paddling condition intelligence powered by machine learning and real-time marine data integration**
    
    ---
    
    ## 🎯 Executive Summary
    
    The Kaayko Paddling Intelligence APIs provide ultra-fast, machine learning-powered paddling condition assessments with comprehensive safety analysis. Our platform processes real-time weather, marine, and environmental data to deliver actionable insights for paddlers across 18+ premium locations.
    
    ### Core Capabilities
    
    | API Endpoint | Purpose | Response Time | Key Features |
    |--------------|---------|---------------|--------------|
    | `paddlingOut` | Location Discovery | ~100ms | Comprehensive location database with amenities |
    | `paddleScore` | Real-time Conditions | ~250ms | Current conditions with ML-powered safety ratings |
    | `fastForecast` | 3-Day Predictions | <4s fresh / <1s cached | Hourly forecasts with penalty breakdown |
    | `forecast` | Premium Analytics | Variable | Advanced analytics for professional use |
    
    ### 🚀 Version 2.1.0 Enhancements
    
    - **🎯 Precision Rating System**: 0.5-increment ratings (1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0)
    - **🌊 Marine Data Integration**: Real-time wave height and water temperature analysis
    - **🔄 Cross-API Consistency**: Identical conditions produce identical ratings across all endpoints
    - **📊 Transparent Penalty System**: Detailed breakdown of all rating adjustments
    - **⚡ Performance Optimization**: 67% improvement in forecast generation (3.8s vs 11.6s)
    - **🛡️ Enhanced Safety**: Proactive warnings for extreme conditions
    
    ## 🧠 Machine Learning Intelligence
    
    ### Rating Scale & Interpretation
    ```
    5.0 │ Perfect      │ Ideal conditions for all skill levels
    4.5 │ Excellent    │ Outstanding conditions, minimal concerns
    4.0 │ Very Good    │ Great conditions with minor considerations
    3.5 │ Good         │ Favorable conditions for most paddlers
    3.0 │ Fair         │ Moderate conditions, some caution advised
    2.5 │ Below Avg    │ Challenging conditions for beginners
    2.0 │ Poor         │ Difficult conditions, experienced only
    1.5 │ Difficult    │ Hazardous conditions, high skill required
    1.0 │ Dangerous    │ Avoid - unsafe for recreational paddling
    ```
    
    ### Intelligent Penalty System
    ```yaml
    Temperature Penalties:
      High Heat (85-94°F):    -1.0 points
      Extreme Heat (95°F+):   -1.5 points
      
    UV Index Penalties:
      Moderate (5-8):         -0.5 points
      High (9-10):           -0.5 points  
      Dangerous (11+):       -1.0 points
      
    Wind Penalties:
      Strong Winds (25+ mph): -2.0 points
      
    Marine Integration:
      Wave height and water temperature factored into base ML prediction
    ```
    
    ## 🌍 Production Test Locations
    
    > **⚠️ CRITICAL**: Always use coordinates from the `paddlingOut` endpoint for accurate marine data integration
    
    ### 📍 Regional Coverage
    
    #### 🌡️ Texas (Extreme Heat Testing)
    - **Trinity River, Irving**: `32.881187,-96.929937` *(Primary extreme heat validation)*
    - **White Rock Lake, Dallas**: `32.833188,-96.729687` *(Urban paddling dynamics)*
    - **Lewisville Lake**: `33.156487,-96.949953` *(Large surface area wind effects)*
    
    #### 🏔️ Colorado (High Altitude Validation)
    - **Cottonwood Lake, Buena Vista**: `38.781063,-106.277812` *(10,000+ ft elevation)*
    - **Antero Reservoir**: `38.982687,-105.896563` *(Alpine conditions)*
    - **Taylor Park Reservoir**: `38.823442,-106.579883` *(Mountain weather patterns)*
    
    #### 🏞️ Pacific Northwest (Marine Integration)
    - **Lake Crescent, Olympic NP**: `48.052813,-123.870438` *(Coastal influence)*
    - **Diablo Lake, North Cascades**: `48.690938,-121.097188` *(Mountain lake dynamics)*
    - **Lake Union, Seattle**: `47.627413,-122.338984` *(Urban marine environment)*
    
    #### 🦬 Rocky Mountain Region (National Parks)
    - **Jenny Lake, Grand Teton NP**: `43.749638,-110.729578` *(Alpine lake conditions)*
    - **Jackson Lake, Wyoming**: `43.845863,-110.600359` *(Large mountain reservoir)*
    - **Lake McDonald, Glacier NP**: `48.52838,-113.992351` *(Glacial lake environment)*
    

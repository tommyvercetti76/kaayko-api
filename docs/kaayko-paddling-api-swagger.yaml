                      predictionSource: "ml-model"
                      modelType: "GradientBoostingRegressor"
                      originalRating: 4.0
                      penalties: ["High heat (87.0°F): -0.5"]
                      totalPenalty: 0.5
                      roundedTo05Increments: true
                    conditions:
                      temperature: 87.0
                      windSpeed: 8.2
                      beaufortScale: 3
                      uvIndex: 7.1
                      marineDataAvailable: true
                    metadata:
                      source: "ml-model"
                      response_time_ms: 158
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_location:
                  summary: Missing location parameters
                  value:
                    success: false
                    error: "Invalid input parameters"
                    details: ["Location required: provide coordinates (lat,lng) or spotId"]
                    usage:
                      endpoint: "/paddleScore"
                      parameters:
                        location_methods: [
                          "lat=32.881187&lng=-96.929937 (separate coordinates)",
                          "location=32.881187,-96.929937 (combined coordinates)",
                          "spotId=trinity_river (known spot ID)"
                        ]
                      examples:
                        coordinates: "/paddleScore?lat=32.881187&lng=-96.929937"
                        location_string: "/paddleScore?location=32.881187,-96.929937"
                        spot_id: "/paddleScore?spotId=trinity_river"
                invalid_coordinates:
                  summary: Invalid coordinate values
                  value:
                    success: false

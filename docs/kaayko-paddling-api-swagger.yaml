                        conditions: "Partly Cloudy"
                        marine:
                          waveHeight: null
                          waterTemp: null
                          available: false
                        paddleAnalysis:
                          rating: 4.5
                          interpretation: "Excellent conditions with minor considerations"
                          confidence: "high"
                          factors: ["Optimal temperature", "Light winds", "Good visibility"]
                      forecast:
                        - date: "2025-08-23"
                          summary:
                            maxTemp: 75.8
                            minTemp: 52.1
                            avgWindSpeed: 6.2
                            precipitation: 0.0
                            paddleWindow: "Excellent all day"
                            bestRating: 5.0

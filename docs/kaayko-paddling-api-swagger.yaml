components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        **Enterprise API Key Authentication**
        
        Contact api-support@kaayko.com for enterprise access and API key provisioning.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        **OAuth 2.0 Bearer Token Authentication**
        
        For service-to-service authentication and enterprise integrations.

  parameters:
    LatitudeParam:
      name: lat
      in: query
      required: true
      schema:
        type: number
        format: double
        minimum: -90.0
        maximum: 90.0
      description: Latitude coordinate in decimal degrees
      example: 32.881187
    
    LongitudeParam:
      name: lng
      in: query
      required: true
      schema:
        type: number
        format: double
        minimum: -180.0
        maximum: 180.0
      description: Longitude coordinate in decimal degrees
      example: -96.929937

  schemas:
    PaddlingLocation:
      type: object
      title: Paddling Location Details
      description: Complete information about a paddling location including coordinates, amenities, and media
      required:
        - id
        - title
        - location
      properties:
        id:
          type: string
          description: Unique location identifier for API references
          pattern: '^[a-z0-9_]+$'
          example: "trinity_river"
        title:
          type: string
          description: Human-readable location name
          minLength: 3
          maxLength: 100
          example: "Trinity River"
        subtitle:
          type: string
          description: Location context and geographical details
          maxLength: 200
          example: "Irving, Texas"
        text:
          type: string
          description: Paddling description, tips, and local insights
          maxLength: 500
          example: "Solitude, birds and a good workout with consistent flow year-round"
        location:
          type: object
          title: GPS Coordinates
          description: Precise GPS coordinates for navigation and API calls
          required:
            - latitude
            - longitude
          properties:
            latitude:
              type: number
              format: double
              minimum: -90.0
              maximum: 90.0
              description: Latitude in decimal degrees (WGS84)
              example: 32.881187
            longitude:
              type: number
              format: double  
              minimum: -180.0
              maximum: 180.0
              description: Longitude in decimal degrees (WGS84)
              example: -96.929937
        difficulty:
          type: string
          description: Paddling difficulty assessment
          enum: ["Easy", "Easy to Moderate", "Moderate", "Moderate to Advanced", "Advanced", "Expert"]
          example: "Easy to Moderate"
        elevation:
          type: integer
          description: Elevation above sea level in feet
          minimum: -100
          maximum: 15000
          example: 450
        features:
          type: array
          description: Key location features and characteristics
          items:
            type: string
          maxItems: 10
          example: ["Urban wildlife", "Year-round access", "Calm waters", "Scenic views"]
        parkingAvl:
          type: boolean
          description: Parking facilities available
          example: true
        restroomsAvl:
          type: boolean
          description: Restroom facilities available
          example: true
        permits_required:
          type: boolean
          description: Whether permits or fees are required
          default: false
          example: false
        youtubeURL:
          type: string
          format: uri
          description: Instructional or promotional YouTube video URL
          pattern: '^https://(www\.)?youtube\.com/watch\?v=.+$'
          example: "https://youtube.com/watch?v=trinity_river_guide"
        imgSrc:
          type: array
          description: High-resolution location images
          items:
            type: string
            format: uri
            description: Direct URL to location image
          maxItems: 5
          example: 
            - "https://kaayko.com/images/trinity_river_aerial.jpg"
            - "https://kaayko.com/images/trinity_river_launch.jpg"
        amenities:
          type: object
          description: Additional amenity details
          properties:
            picnicTables:
              type: boolean
              example: true
            grillsAvailable:
              type: boolean
              example: false
            shadedAreas:
              type: boolean
              example: true
            rentalEquipment:
              type: boolean
              example: false

    FastForecastResponse:
      type: object
      title: Fast Forecast Response
      description: High-performance 3-day forecast with ML paddle predictions and marine data
      required:
        - success
        - location
        - forecast
        - metadata
      properties:
        success:
          type: boolean
          description: Request success indicator
          example: true
        location:
          type: object
          title: Location Information
          description: Detailed location context and geographical information
          required:
            - name
            - region
            - country
            - coordinates
          properties:
            name:
              type: string
              description: City or locality name
              example: "Irving"
            region:
              type: string
              description: State or province
              example: "Texas"
            country:
              type: string
              description: Country name
              example: "United States of America"
            coordinates:
              type: object
              description: Exact coordinates used for forecast
              required:
                - latitude
                - longitude
              properties:
                latitude:
                  type: number
                  format: double
                  description: Latitude in decimal degrees
                  example: 32.881187
                longitude:
                  type: number
                  format: double
                  description: Longitude in decimal degrees
                  example: -96.929937
            elevation:
              type: integer
              description: Elevation above sea level in feet
              example: 450
            timezone:
              type: string
              description: IANA timezone identifier
              example: "America/Chicago"
        forecast:
          type: array
          description: 3 days of comprehensive hourly forecasts with ML predictions
          minItems: 1
          maxItems: 3
          items:
            type: object
            title: Daily Forecast
            description: Complete daily forecast with hourly breakdown and summary
            required:
              - date
              - hourly
            properties:
              date:
                type: string
                format: date
                description: Forecast date in YYYY-MM-DD format
                example: "2025-08-23"
              summary:
                type: object
                title: Daily Summary
                description: Daily aggregated forecast metrics and insights
                properties:
                  maxTemp:
                    type: number
                    format: float
                    description: Maximum temperature for the day
                    example: 95.2
                  minTemp:
                    type: number
                    format: float
                    description: Minimum temperature for the day
                    example: 78.8
                  avgWindSpeed:
                    type: number
                    format: float
                    description: Average wind speed for the day
                    example: 6.8
                  precipitation:
                    type: number
                    format: float
                    description: Total precipitation in inches
                    example: 0.0
                  paddleWindow:
                    type: string
                    description: Recommended paddling time window
                    example: "Early morning (6-9 AM) and evening (5-7 PM)"
                  bestRating:
                    type: number
                    format: float
                    multipleOf: 0.5
                    minimum: 1.0
                    maximum: 5.0
                    description: Highest paddle rating for the day
                    example: 4.0
                  avgRating:
                    type: number
                    format: float
                    description: Average paddle rating for the day
                    example: 3.2
                  conditions:
                    type: string
                    description: General weather conditions summary
                    example: "Hot and sunny with light winds"
              hourly:
                type: object
                description: Hourly forecast data keyed by hour (00-23)
                additionalProperties:
                  $ref: '#/components/schemas/HourlyForecast'
                example:
                  "08":
                    temperature: 82.4
                    windSpeed: 4.2
                    rating: 4.0
                  "15":
                    temperature: 99.2
                    windSpeed: 1.8
                    rating: 2.0
        metadata:
          type: object
          title: Response Metadata
          description: Processing information and API performance metrics
          required:
            - processingTimeMs
            - responseTime
            - cached
          properties:
            processingTimeMs:
              type: integer
              description: Total processing time in milliseconds
              minimum: 0
              example: 3833
            responseTime:
              type: string
              description: Human-readable response time
              pattern: '^\d+(\.\d+)?(ms|s)$'
              example: "3.83s"
            cached:
              type: boolean
              description: Whether response was served from cache
              example: false
            cacheAge:
              type: string
              description: Age of cached data (if applicable)
              example: "14 minutes"
            mlServiceUrl:
              type: string
              format: uri
              description: Production ML service endpoint used
              example: "https://kaayko-ml-service-87383373015.us-central1.run.app"
            dataFreshness:
              type: string
              description: Data freshness indicator
              enum: ["live", "cached", "stale"]
              example: "live"
            totalHours:
              type: integer
              description: Total hours of forecast data provided
              example: 72
            apiVersion:
              type: string
              description: API version used for processing
              example: "2.1.0"

    HourlyForecast:
      type: object
      title: Hourly Forecast Data
      description: Comprehensive hourly weather conditions with ML paddle predictions and safety analysis
      required:
        - temperature
        - windSpeed
        - rating
        - prediction
      properties:
        # Core Weather Conditions
        temperature:
          type: number
          format: float
          description: Temperature in specified units (Fahrenheit default)
          example: 36.2
        temperatureUnit:
          type: string
          description: Temperature unit
          enum: ["fahrenheit", "celsius"]
          default: "fahrenheit"
          example: "fahrenheit"
        windSpeed:
          type: number
          format: float
          description: Wind speed in specified units (MPH default)
          minimum: 0
          example: 1.9
        windSpeedUnit:
          type: string
          description: Wind speed unit
          enum: ["mph", "kph", "knots"]
          default: "mph"
          example: "mph"
        windDirection:
          type: string
          description: Wind direction (cardinal/intercardinal)
          pattern: '^(N|NE|E|SE|S|SW|W|NW|NNE|ENE|ESE|SSE|SSW|WSW|WNW|NNW)$'
          example: "E"
        gustSpeed:
          type: number
          format: float
          description: Wind gust speed in specified units
          minimum: 0
          example: 2.47
        
        # Atmospheric Conditions
        humidity:
          type: integer
          description: Relative humidity percentage
          minimum: 0
          maximum: 100
          example: 39
        cloudCover:
          type: integer
          description: Cloud cover percentage
          minimum: 0
          maximum: 100
          example: 73
        uvIndex:
          type: number
          format: float
          description: UV index (0-16 scale)
          minimum: 0
          maximum: 16
          example: 8.3
        uvCategory:
          type: string
          description: UV risk category
          enum: ["Low", "Moderate", "High", "Very High", "Extreme"]
          example: "Very High"
        visibility:
          type: number
          format: float
          description: Visibility in specified units (miles default)
          minimum: 0
          example: 10.0
        visibilityUnit:
          type: string
          enum: ["miles", "kilometers"]
          default: "miles"
          example: "miles"
        
        # Safety and Warnings
        hasWarnings:
          type: boolean
          description: Whether any safety warnings are present
          example: true
        warnings:
          type: array
          description: Safety warnings based on current conditions
          items:
            type: string
            description: Specific safety warning message
          maxItems: 10
          example: 
            - "DANGER: High UV (8.3) - seek shade/shelter"
            - "CAUTION: Minimal wind - poor cooling effect"
        
        # Wind Analysis
        beaufortScale:
          type: integer
          description: Beaufort wind scale (0-12)
          minimum: 0
          maximum: 12
          example: 0
        beaufortDescription:
          type: string
          description: Beaufort scale description
          enum: ["Calm", "Light air", "Light breeze", "Gentle breeze", "Moderate breeze", "Fresh breeze", "Strong breeze", "High wind", "Gale", "Severe gale", "Storm", "Violent storm", "Hurricane"]
          example: "Calm"
        
        # Marine Data
        waveHeight:
          type: number
          format: float
          description: Wave height in meters (from marine data sources)
          minimum: 0
          nullable: true
          example: 0.1
        waterTemp:
          type: number
          format: float
          description: Water temperature in Celsius (from marine data)
          nullable: true
          example: 28.2
        marineDataAvailable:
          type: boolean
          description: Whether real marine data was available for this forecast
          example: true
        tidalInfo:
          type: object
          description: Tidal information (when available)
          nullable: true
          properties:
            currentTide:
              type: string
              enum: ["rising", "falling", "high", "low"]
              example: "rising"
            nextTideTime:
              type: string
              format: time
              example: "14:30"
            nextTideType:
              type: string
              enum: ["high", "low"]
              example: "high"
        
        # ML Prediction and Rating
        prediction:
          $ref: '#/components/schemas/EnhancedMLPrediction'
        rating:
          type: number
          format: float
          description: Overall paddle rating (1.0-5.0, 0.5 increments only)
          minimum: 1.0
          maximum: 5.0
          multipleOf: 0.5
          example: 3.0
        
        # Model Information
        mlModelUsed:
          type: boolean
          description: Whether the production ML model was successfully used
          example: true
        predictionSource:
          type: string
          description: Source of the prediction
          enum: ["ml-model", "fallback", "cached", "interpolated"]
          example: "ml-model"
        
        # Timing Information  
        localTime:
          type: string
          format: time
          description: Local time for this forecast hour
          example: "21:00"
        utcTime:
          type: string
          format: date-time
          description: UTC timestamp for this forecast hour
          example: "2025-08-23T02:00:00Z"

    EnhancedMLPrediction:
      type: object
      title: Enhanced ML Prediction Analysis
      description: Comprehensive machine learning prediction with transparent penalty system and confidence metrics
      required:
        - rating
        - originalRating
        - penaltiesApplied
        - totalPenalty
        - mlModelUsed
        - predictionSource
      properties:
        rating:
          type: number
          format: float
          minimum: 1.0
          maximum: 5.0
          multipleOf: 0.5
          description: |
            **Final ML-predicted paddle rating (0.5 increments only)**
            
            This is the final rating after applying all penalties and rounding to 0.5 increments. 
            Possible values: 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0
          example: 3.0
        originalRating:
          type: number
          format: float
          minimum: 1.0
          maximum: 5.0
          description: |
            **Base ML rating before penalty system application**
            
            Raw machine learning model output before safety penalties and adjustments.
          example: 5.0
        penaltiesApplied:
          type: array
          description: |
            **Detailed breakdown of all penalties applied to the original rating**
            
            Each penalty includes the condition that triggered it and the exact point deduction.
          items:
            type: string
            description: Human-readable penalty description with specific values and deduction
            pattern: '^.+: -\d+(\.\d+)?$'
          maxItems: 10
          example: 
            - "Extreme heat (97.2°F): -1.5"
            - "High UV (8.3): -0.5"
        totalPenalty:
          type: number
          format: float
          minimum: 0.0
          description: |
            **Total penalty points deducted from original rating**
            
            Sum of all individual penalties applied to the base ML prediction.
          example: 2.0
        penaltyBreakdown:
          type: object
          description: Structured breakdown of penalty categories
          properties:
            temperaturePenalty:
              type: number
              format: float
              minimum: 0.0
              description: Penalty applied for temperature extremes
              example: 1.5
            uvPenalty:
              type: number
              format: float
              minimum: 0.0
              description: Penalty applied for high UV index
              example: 0.5
            windPenalty:
              type: number
              format: float
              minimum: 0.0
              description: Penalty applied for strong winds
              example: 0.0
            visibilityPenalty:
              type: number
              format: float
              minimum: 0.0
              description: Penalty applied for poor visibility
              example: 0.0
        roundedTo05Increments:
          type: boolean
          description: |
            **Confirms rating was forced to 0.5 increments**
            
            Always true - ensures API consumers that ratings follow the 0.5 increment rule.
          example: true
        mlModelUsed:
          type: boolean
          description: |
            **Whether the production ML model was successfully used**
            
            False indicates fallback to rule-based system due to ML service unavailability.
          example: true
        predictionSource:
          type: string
          description: |
            **Source system that generated this prediction**
            
            Helps track prediction quality and debugging when needed.
          enum: ["ml-model", "fallback", "cached", "interpolated"]
          example: "ml-model"
        confidence:
          type: object
          description: Prediction confidence metrics
          properties:
            level:
              type: string
              enum: ["low", "medium", "high"]
              description: Overall confidence in the prediction
              example: "high"
            score:
              type: number
              format: float
              minimum: 0.0
              maximum: 1.0
              description: Numerical confidence score (0.0-1.0)
              example: 0.92
            factors:
              type: array
              items:
                type: string
              description: Factors contributing to confidence level
              example: ["Complete weather data", "Marine data available", "Historical validation"]
        modelMetadata:
          type: object
          description: ML model information and performance metrics
          properties:
            modelVersion:
              type: string
              description: Version of the ML model used
              example: "GradientBoostingRegressor-v2.1.0"
            trainingDate:
              type: string
              format: date
              description: Date the model was last trained
              example: "2025-08-15"
            features:
              type: array
              items:
                type: string
              description: Features used by the ML model
              example: ["temperature", "windSpeed", "uvIndex", "visibility", "humidity", "waveHeight", "waterTemp"]
            predictionTime:
              type: number
              format: float
              description: Time taken to generate prediction in milliseconds
              example: 23.7

    PaddleScoreResponse:
      type: object
      title: Paddle Score Response
      description: Real-time paddle condition assessment with ML-powered safety rating and comprehensive environmental analysis
      required:
        - success
        - location
        - paddleScore
        - conditions
        - metadata
      properties:
        success:
          type: boolean
          description: Request success indicator
          example: true
        location:
          type: object
          title: Location Context
          description: Detailed location information and geographical context
          required:
            - name
            - coordinates
          properties:
            name:
              type: string
              description: City or locality name
              maxLength: 100
              example: "Irving"
            coordinates:
              type: object
              description: Exact coordinates used for assessment
              required:
                - latitude
                - longitude
              properties:
                latitude:
                  type: number
                  format: double
                  description: Latitude in decimal degrees (WGS84)
                  example: 32.881187
                longitude:
                  type: number
                  format: double
                  description: Longitude in decimal degrees (WGS84)
                  example: -96.929937
            region:
              type: string
              description: State, province, or administrative region
              example: "Texas"
            country:
              type: string
              description: Country name
              example: "United States of America"
            elevation:
              type: integer
              description: Elevation above sea level in feet
              example: 450
            timezone:
              type: string
              description: IANA timezone identifier
              example: "America/Chicago"
        paddleScore:
          type: object
          title: ML Paddle Assessment
          description: Machine learning-powered paddle safety assessment with detailed analysis
          required:
            - rating
            - interpretation
            - confidence
          properties:
            rating:
              type: number
              format: float
              minimum: 1.0
              maximum: 5.0
              multipleOf: 0.5
              description: |
                **Final ML paddle rating (0.5 increments only)**
                
                Scale: 1.0=Dangerous, 1.5=Difficult, 2.0=Poor, 2.5=Below Average, 3.0=Fair, 
                3.5=Good, 4.0=Very Good, 4.5=Excellent, 5.0=Perfect
              example: 2.0
            interpretation:
              type: string
              description: Human-readable rating interpretation with skill level guidance
              maxLength: 200
              example: "Poor - Difficult conditions, experienced paddlers only"
            confidence:
              type: string
              description: Confidence level in the ML prediction
              enum: ["low", "medium", "high"]
              example: "high"
            modelUsed:
              type: string
              description: ML model identifier used for prediction
              example: "production-ml-v2.1"
            originalRating:
              type: number
              format: float
              description: Base ML rating before penalty system application
              minimum: 1.0
              maximum: 5.0
              example: 3.5
            penaltiesApplied:
              type: array
              description: Detailed breakdown of all penalties applied
              items:
                type: string
                pattern: '^.+: -\d+(\.\d+)?$'
              example: ["Extreme heat (99.0°F): -1.5"]
            totalPenalty:
              type: number
              format: float
              minimum: 0.0
              description: Total penalty points deducted from original rating
              example: 1.5
            roundedTo05Increments:
              type: boolean
              description: Confirms rating follows 0.5 increment rule
              example: true
        conditions:
          type: object
          title: Current Environmental Conditions
          description: Comprehensive current weather and marine conditions with safety analysis
          required:
            - temperature
            - windSpeed
            - hasWarnings
          properties:
            # Temperature
            temperature:
              type: number
              format: float
              description: Current temperature in specified units
              example: 99.0
            temperatureUnit:
              type: string
              enum: ["fahrenheit", "celsius"]
              default: "fahrenheit"
              example: "fahrenheit"
            feelsLike:
              type: number
              format: float
              description: Apparent temperature accounting for humidity and wind
              example: 105.2
            
            # Wind Conditions
            windSpeed:
              type: number
              format: float
              minimum: 0
              description: Current wind speed in specified units
              example: 2.2
            windSpeedUnit:
              type: string
              enum: ["mph", "kph", "knots"]
              default: "mph"
              example: "mph"
            windDirection:
              type: string
              description: Wind direction (cardinal/intercardinal)
              example: "S"
            gustSpeed:
              type: number
              format: float
              minimum: 0
              description: Wind gust speed in specified units
              example: 4.1
            beaufortScale:
              type: integer
              minimum: 0
              maximum: 12
              description: Beaufort wind scale rating
              example: 1
            beaufortDescription:
              type: string
              description: Beaufort scale interpretation
              example: "Light air"
            
            # Atmospheric Conditions
            uvIndex:
              type: number
              format: float
              minimum: 0
              maximum: 16
              description: Current UV index
              example: 9.8
            uvCategory:
              type: string
              enum: ["Low", "Moderate", "High", "Very High", "Extreme"]
              example: "Very High"
            visibility:
              type: number
              format: float
              minimum: 0
              description: Visibility distance in specified units
              example: 21.0
            visibilityUnit:
              type: string
              enum: ["miles", "kilometers"]
              default: "miles"
              example: "miles"
            humidity:
              type: integer
              minimum: 0
              maximum: 100
              description: Relative humidity percentage
              example: 33
            cloudCover:
              type: integer
              minimum: 0
              maximum: 100
              description: Cloud cover percentage
              example: 25
            
            # Safety Warnings
            hasWarnings:
              type: boolean
              description: Whether any safety warnings are active
              example: true
            warnings:
              type: array
              description: Active safety warnings and advisories
              items:
                type: string
                description: Specific safety warning message
              example: 
                - "DANGER: Extreme heat (99°F) - high risk of heat exhaustion"
                - "CAUTION: Very high UV (9.8) - use maximum sun protection"
            
            # Marine Data
            waveHeight:
              type: number
              format: float
              minimum: 0
              description: Current wave height in meters (from marine data)
              nullable: true
              example: 0.2
            waterTemp:
              type: number
              format: float
              description: Water temperature in Celsius (from marine data)
              nullable: true
              example: 31.4
            marineDataAvailable:
              type: boolean
              description: Whether real marine data was used
              example: true
            
            # Additional Metrics
            dewPoint:
              type: number
              format: float
              description: Dew point temperature
              example: 72.1
            pressure:
              type: number
              format: float
              description: Atmospheric pressure in inches of mercury
              example: 29.92
            pressureUnit:
              type: string
              enum: ["inHg", "hPa", "mmHg"]
              default: "inHg"
              example: "inHg"
        metadata:
          type: object
          title: Response Metadata
          description: Processing information, model details, and performance metrics
          required:
            - timestamp
            - source
            - responseTimeMs
          properties:
            source:
              type: string
              description: Prediction data source
              enum: ["ml-model", "fallback", "cached"]
              example: "ml-model"
            modelType:
              type: string
              description: ML model algorithm used
              example: "GradientBoostingRegressor"
            modelVersion:
              type: string
              description: Specific model version identifier
              example: "v2.1.0-production"
            timestamp:
              type: string
              format: date-time
              description: UTC timestamp when assessment was generated
              example: "2025-08-23T15:45:22.120Z"
            responseTimeMs:
              type: integer
              minimum: 0
              description: Total processing time in milliseconds
              example: 247
            cacheHit:
              type: boolean
              description: Whether response was served from cache
              example: false
            dataAge:
              type: string
              description: Age of the weather data used
              example: "5 minutes"
            mlServiceHealth:
              type: string
              enum: ["healthy", "degraded", "offline"]
              description: Status of the ML prediction service
              example: "healthy"

    ForecastResponse:
      type: object
      description: Premium comprehensive forecast response
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            location:
              type: string
              example: "38.781063,-106.277812"  
            current:
              type: object
              description: Current conditions with paddle analysis
              properties:
                temperature:
                  type: number
                  description: Current temperature
                windSpeed:
                  type: number
                  description: Current wind speed
                conditions:
                  type: string
                  description: Weather conditions
                paddleAnalysis:
                  type: object
                  description: Paddle condition analysis
                  properties:
                    rating:
                      type: number
                      minimum: 1
                      maximum: 5
                      multipleOf: 0.5
                    interpretation:
                      type: string
            forecast:
              type: array
              description: Extended forecast with detailed analysis
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  summary:
                    type: object
                    properties:
                      maxTemp:
                        type: number
                      minTemp:
                        type: number
                      avgWindSpeed:
                        type: number
                      precipitation:
                        type: number
                      paddleWindow:
                        type: string
                      bestRating:
                        type: number
                      avgRating:
                        type: number
                  hourly:
                    type: array
                    items:
                      $ref: '#/components/schemas/HourlyForecast'
        metadata:
          type: object
          properties:
            generated:
              type: string
              format: date-time

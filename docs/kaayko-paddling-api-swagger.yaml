  /fastForecast:
    get:
      tags:
        - fastForecast
      operationId: getFastForecast
      summary: Get 3-day weather forecast with ML-powered paddle predictions
      description: |
        **Ultra-fast 72-hour forecast with machine learning paddle intelligence and marine data integration**
        
        This high-performance endpoint delivers comprehensive 3-day hourly forecasts with ML-generated paddle ratings, safety warnings, and detailed penalty analysis.
        
        ### 🚀 Performance Characteristics
        - **Fresh Data**: <4 seconds (67% faster than v2.0)
        - **Cached Data**: <1 second (sub-second for repeated requests)
        - **Production ML**: Powered by kaayko-ml-service-87383373015.us-central1.run.app
        
        ### 🧠 Advanced ML Features
        - **72-Hour Predictions**: Hourly paddle ratings for full 3 days
        - **Marine Integration**: Wave height and water temperature when available
        - **Penalty Transparency**: Detailed breakdown of all rating adjustments
        - **Safety Warnings**: Proactive alerts for dangerous conditions
        - **Beaufort Scale**: Professional wind analysis (0-12 scale)
        - **UV Analysis**: Comprehensive sun exposure assessment
        
        ### 📊 Enhanced Penalty System
        ```yaml
        Temperature Penalties:
          High Heat (85-94°F):    -1.0 rating points
          Extreme Heat (95°F+):   -1.5 rating points
          
        UV Index Penalties:
          Moderate (5-8):         -0.5 rating points
          High (9-10):           -0.5 rating points  
          Dangerous (11+):       -1.0 rating points
          
        Wind Penalties:
          Strong Winds (25+ mph): -2.0 rating points
        ```
        
        ### 🔄 Cross-API Consistency
        Identical weather conditions will produce identical paddle ratings across `paddleScore` and `fastForecast` endpoints, ensuring reliable decision-making.
        
        ### ⚠️ Marine Data Requirement
        **Always use coordinates from `paddlingOut` endpoint** to ensure marine data availability and prediction accuracy.
        
      parameters:

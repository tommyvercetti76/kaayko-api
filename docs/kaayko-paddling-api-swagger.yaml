              type: string
              example: "scheduled-forecast"

    PaddleSummary:
      type: object
      title: ML Paddle Prediction Summary
      description: Comprehensive paddle condition analysis from ML service
      required:
        - score
        - mlRating
        - interpretation
        - wind_mph
        - temp_f
        - factors
        - mlModelUsed
        - predictionSource
      properties:
        score:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: Normalized paddle score (0-1 scale for UI compatibility)
          example: 0.85
        mlRating:
          type: number
          format: double
          minimum: 1.0
          maximum: 5.0
          description: Original ML rating on 1-5 scale with 0.5 increments
          example: 4.5
        interpretation:
          type: string
          enum: ["excellent", "good", "fair", "poor"]
          description: Human-readable interpretation of paddle conditions
          example: "excellent"
        wind_mph:
          type: number
          format: double
          minimum: 0.0
          description: Wind speed in miles per hour
          example: 8.2
        temp_f:
          type: number
          format: double
          description: Temperature in Fahrenheit
          example: 78.4
        factors:
          type: object
          description: Categorized environmental factors
          required: ["wind", "temperature", "weather"]
          properties:
            wind:
              type: string
              enum: ["low", "moderate", "high"]
              example: "moderate"
            temperature:
              type: string
              enum: ["cold", "comfortable", "warm"]
              example: "warm"
            weather:
              type: string
              description: Current weather conditions text
              example: "Partly cloudy"
        mlModelUsed:
          type: boolean
          description: Whether ML model was successfully used for prediction
          example: true
        predictionSource:
          type: string
          enum: ["ml-model", "fallback-rules"]
          description: Source of the prediction (ML model or fallback rules)
          example: "ml-model"
        confidence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: Prediction confidence level (0-1 scale)
          example: 0.92

    SafetyLevel:
      type: object
      title: Safety Level Assessment
      description: Professional safety level analysis with color-coded warnings
      required:
        - level
        - color
        - warning
      properties:
        level:
          type: string
          enum: ["excellent", "moderate", "caution", "dangerous"]
          description: Overall safety level classification
          example: "excellent"
        color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          description: Hex color code for UI display
          example: "#44ff44"
        warning:
          type: string
          maxLength: 200
          description: Safety warning or condition description
          example: "Perfect for paddling"

    ErrorResponse:
      type: object
      title: Error Response
      description: Standardized error response format with detailed debugging information
      required:
        - success
        - error
        - code
        - timestamp
      properties:
        success:
          type: boolean
          description: Request success indicator (always false for errors)
          example: false
        error:
          type: string
          description: Human-readable error message
          maxLength: 200
          example: "Invalid coordinates"
        code:
          type: string
          description: Machine-readable error code for programmatic handling
          pattern: '^[A-Z_]+$'
          example: "INVALID_COORDINATES"
        details:
          type: string
          description: Additional technical details about the error
          maxLength: 500
          example: "Latitude must be between -90.0 and 90.0, longitude must be between -180.0 and 180.0"
        suggestion:
          type: string
          description: Helpful suggestion for resolving the error
          maxLength: 300
          example: "Use coordinates from paddlingOut API for accurate marine data"
        timestamp:
          type: string
          format: date-time
          description: UTC timestamp when error occurred
          example: "2025-08-23T15:45:22.120Z"
        requestId:
          type: string
          description: Unique identifier for this request (for support purposes)
          pattern: '^[a-f0-9-]+$'
          example: "req_8f9e2d1a-4b5c-6789-01ef-234567890abc"
        retryAfter:
          type: integer
          minimum: 0
          description: Seconds to wait before retrying (for rate limit errors)
          example: 60
        supportUrl:
          type: string
          format: uri
          description: URL for additional support or documentation
          example: "https://kaayko.com/docs/api/errors#invalid-coordinates"


          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "Paddling spot not found"
                spotId: "invalid_spot"
                available_via: "/paddlingOut"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /forecast:
    get:
      tags:
        - forecast
      operationId: getForecast
      summary: Generate comprehensive weather forecast with ML predictions (Premium)
      description: |
        **🔒 PREMIUM FORECAST API - Advanced comprehensive weather analysis with ML intelligence**
        
        This premium endpoint generates comprehensive weather forecasts with ML predictions, used by scheduled jobs and premium users. Results are automatically cached for the `fastForecast` API to serve to frontend applications.
        
        ### � Advanced Features
        - **Comprehensive Analysis**: Detailed weather data with ML-powered paddle predictions
        - **Auto-Caching**: Results cached for 2 hours to optimize `fastForecast` performance
        - **Safety Analysis**: Professional safety level assessments with color-coded warnings
        - **Batch Processing**: Supports scheduled background processing for multiple locations
        - **Premium Access**: Rate-limited for internal and premium users only
        
        ### 🎯 Use Cases
        - **Scheduled Jobs**: Background forecast generation for popular paddling spots
        - **Premium Users**: Advanced forecast analysis with detailed ML insights
        - **Data Pipeline**: Source data for high-performance `fastForecast` endpoint
        - **Research**: Comprehensive weather-to-paddle correlations
        
        ### ⚡ Performance Characteristics
        - **Rate Limit**: 10 requests per minute (premium tier)
        - **Processing**: 3-5 seconds for fresh data generation
        - **Caching**: 2-hour cache lifetime in Firestore
        - **ML Integration**: Full ML service pipeline with penalty analysis
        
        ### 🔄 Relationship to fastForecast
        This endpoint generates the comprehensive data that powers the ultra-fast `fastForecast` API. Use `forecast` for data generation and analysis, use `fastForecast` for high-performance frontend delivery.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: -90.0
            maximum: 90.0
            example: 32.881187
          description: |
            **Latitude coordinate in decimal degrees**
            
            Must be a valid latitude between -90.0 and 90.0.
            
            **Example**: `32.881187` (Trinity River, Texas)
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: -180.0
            maximum: 180.0
            example: -96.929937
          description: |
            **Longitude coordinate in decimal degrees**
            
            Must be a valid longitude between -180.0 and 180.0.
            
            **Example**: `-96.929937` (Trinity River, Texas)
      responses:

# ============================================================================
# Cloud Build — Weekly Paddle Score Model Retraining Pipeline
# ============================================================================
#
# Trigger this manually or schedule it via Cloud Scheduler:
#   gcloud scheduler jobs create http kaayko-model-retrain \
#     --schedule="0 2 * * 1" \          # every Monday 02:00 UTC
#     --uri="https://cloudbuild.googleapis.com/v1/projects/$PROJECT_ID/triggers/$TRIGGER_ID:run" \
#     --oauth-service-account-email="..." \
#     --location="us-central1"
#
# Required substitutions (set in Cloud Build trigger):
#   _GCS_BUCKET     — GCS bucket for models     (e.g. kaayko-ml-models)
#   _GCS_OBJECT     — GCS object path for live model (e.g. paddle-score/current.pkl)
#   _REGION         — Cloud Run region           (e.g. us-central1)
#   _SERVICE_NAME   — Cloud Run service name     (e.g. kaayko-ml-service)
#   _IMAGE          — Artifact Registry image URI
#
# The pipeline:
#   1. Install Python deps
#   2. Run retraining with quality gate (MAE ≤ 0.7)
#      - If gate passes → new model written to GCS as current.pkl
#      - If gate fails  → build fails, old model stays live (no rollback needed)
#   3. Rebuild + push the Docker image (so it picks up any code changes)
#   4. Deploy new image to Cloud Run (container downloads model from GCS at startup)
# ============================================================================

substitutions:
  _GCS_BUCKET:    'kaayko-ml-models'
  _GCS_OBJECT:    'paddle-score/current.pkl'
  _REGION:        'us-central1'
  _SERVICE_NAME:  'kaayko-ml-service'
  _IMAGE:         'us-central1-docker.pkg.dev/$PROJECT_ID/kaayko/ml-service'
  _MIN_SAMPLES:   '50'
  _MAE_GATE:      '0.7'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'  # 30 min — generous for large datasets

steps:

  # ── Step 1: Retrain + quality gate ───────────────────────────────────────
  - name: 'python:3.11-slim'
    id: 'retrain'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd ml-service
        pip install --quiet -r requirements.txt
        python retrain_model.py \
          --min-samples $_MIN_SAMPLES \
          --mae-gate    $_MAE_GATE
    env:
      - 'GCP_PROJECT=$PROJECT_ID'
      - 'ML_MODEL_BUCKET=$_GCS_BUCKET'
      - 'ML_MODEL_OBJECT=$_GCS_OBJECT'

  # ── Step 2: Build Docker image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    waitFor: ['retrain']
    args:
      - 'build'
      - '-t'
      - '$_IMAGE:$SHORT_SHA'
      - '-t'
      - '$_IMAGE:latest'
      - 'ml-service'

  # ── Step 3: Push to Artifact Registry ────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - '$_IMAGE'

  # ── Step 4: Deploy to Cloud Run ───────────────────────────────────────────
  # The new container downloads current.pkl from GCS at startup — no model
  # is baked into the image, so this step is instant regardless of model size.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--no-traffic'        # deploy without shifting traffic until smoke-tested
      - '--tag=candidate'     # accessible at https://candidate---<hash>.run.app
    env:
      - 'CLOUDSDK_CORE_PROJECT=$PROJECT_ID'

  # ── Step 5: Smoke-test the candidate revision ─────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'smoke-test'
    waitFor: ['deploy']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        URL=$(gcloud run services describe $_SERVICE_NAME \
          --region=$_REGION --format='value(status.url)')
        echo "Smoke-testing $URL/health ..."
        STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/health")
        if [ "$STATUS" != "200" ]; then
          echo "❌ Health check returned HTTP $STATUS — aborting traffic migration"
          exit 1
        fi
        echo "✅ Health check passed"

  # ── Step 6: Migrate 100 % traffic to the new revision ────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'migrate-traffic'
    waitFor: ['smoke-test']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - '$_SERVICE_NAME'
      - '--region=$_REGION'
      - '--to-latest'
    env:
      - 'CLOUDSDK_CORE_PROJECT=$PROJECT_ID'

images:
  - '$_IMAGE:$SHORT_SHA'
  - '$_IMAGE:latest'
